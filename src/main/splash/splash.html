<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MudrikNow</title>
  <style>
    :root {
      --cyan: #18BFE1;
      --cyan-deep: #0E9AB8;
      --cyan-glow: rgba(24, 191, 225, 0.35);
      --gold: #F2A93A;
      --body: #7499C2;
      --ink: #2D4A63;
      --bg: #0F1822;
      --bg-card: rgba(18, 32, 42, 0.92);
      --text: #E6F4F7;
      --text-muted: #8FBFCD;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: transparent;
      user-select: none;
    }

    .splash {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      /* Existing card fill plus two slow aurora blobs layered on top.
         Same conservative approach as the panel: solid base + gradients,
         no transparency/backdrop-filter. */
      background:
        radial-gradient(80% 60% at 25% 30%, rgba(24, 191, 225, 0.10), transparent 65%),
        radial-gradient(70% 70% at 75% 75%, rgba(242, 169, 58, 0.08), transparent 65%),
        radial-gradient(140% 140% at 50% 0%, rgba(24, 191, 225, 0.12) 0%, transparent 55%),
        var(--bg-card);
      background-size: 200% 200%, 200% 200%, 100% 100%, 100% 100%;
      animation: splashAuroraShift 26s ease-in-out infinite;
      border: 1px solid rgba(24, 191, 225, 0.25);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45),
                  0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                  0 0 40px var(--cyan-glow);
      backdrop-filter: blur(12px);
      -webkit-app-region: no-drag;
    }

    @keyframes splashAuroraShift {
      0%, 100% { background-position: 0% 0%, 100% 100%, 50% 0%, 0 0; }
      50% { background-position: 100% 100%, 0% 0%, 50% 0%, 0 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .splash { animation: none; }
    }

    .owl {
      height: 88px; width: auto;
      margin-bottom: 14px;
      filter: drop-shadow(0 6px 18px rgba(24, 191, 225, 0.22));
      animation: bob 2.4s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .wordmark {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 22px;
      text-align: center;
      line-height: 1.5;
    }

    .shortcuts {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .shortcut {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: 7px;
      background: rgba(24, 191, 225, 0.1);
      border: 1px solid rgba(24, 191, 225, 0.22);
      color: var(--cyan);
      font-size: 11px;
      font-weight: 600;
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    }

    .shortcut .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ADE80;
      box-shadow: 0 0 8px #4ADE80;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }

    .footer {
      position: absolute;
      bottom: 14px;
      font-size: 10px;
      color: rgba(143, 191, 205, 0.55);
      text-align: center;
    }

    /* Click-to-skip hint */
    .skip-hint {
      position: absolute;
      bottom: 22px;
      font-size: 10px;
      color: rgba(143, 191, 205, 0.4);
      opacity: 0;
      animation: fadeHint 0.5s ease 1.2s forwards;
    }

    @keyframes fadeHint {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <!-- Owl hero — static mascot.png (transparent background). Replace assets/mascot.png to upgrade the splash character. -->
    <img class="owl" src="mascot.png" alt="MudrikNow owl mascot" />

    <div class="wordmark">MudrikNow</div>
    <div class="tagline" id="tagline">Running in the background. Call MudrikNow any time with a shortcut.</div>

    <div class="shortcuts" id="shortcuts">
      <span class="shortcut"><span class="dot"></span>Alt+Space</span>
      <span class="shortcut"><span class="dot"></span>Alt+X</span>
    </div>

    <div class="status">
      <span class="pulse"></span>
      <span id="status-text">Ready</span>
    </div>

    <div class="skip-hint">Click to dismiss</div>
  </div>

  <script src="./splash-renderer.js"></script>
</body>
</html>
