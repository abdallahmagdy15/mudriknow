<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    /* --- Guide Speech Bubble --- */
    .guide-bubble {
      position: absolute;
      min-width: 140px;
      max-width: 280px;
      padding: 10px 14px;
      border-radius: 12px;
      font-family: -apple-system, Segoe UI, system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: opacity 300ms ease, transform 300ms ease;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: auto;
      z-index: 100;
      display: none;
    }
    .guide-bubble.visible {
      opacity: 1;
      transform: translateY(0);
      display: block;
    }
    .guide-bubble.faded {
      opacity: 0.3;
    }

    /* Light theme */
    .guide-bubble.light {
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a1a;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .guide-bubble.light .guide-bubble-tail {
      background: rgba(255, 255, 255, 0.95);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    /* Dark theme */
    .guide-bubble.dark {
      background: rgba(30, 30, 30, 0.92);
      color: #f0f0f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .guide-bubble.dark .guide-bubble-tail {
      background: rgba(30, 30, 30, 0.92);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .guide-bubble-caption {
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .guide-bubble-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .guide-bubble-btn {
      padding: 5px 12px;
      border-radius: 16px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 100ms, opacity 150ms;
      font-family: inherit;
      pointer-events: auto;
    }
    .guide-bubble-btn:hover {
      transform: scale(1.05);
    }
    .guide-bubble-btn:active {
      transform: scale(0.95);
    }

    .guide-bubble-btn.primary {
      background: rgba(242, 169, 58, 0.18);
      color: #C7841E;
      border: 1px solid rgba(242, 169, 58, 0.35);
      box-shadow: 0 2px 6px rgba(242, 169, 58, 0.15);
    }
    .guide-bubble-btn.primary:hover {
      background: rgba(242, 169, 58, 0.28);
    }
    .guide-bubble-btn.secondary {
      background: transparent;
      color: inherit;
      border: 1px solid rgba(116, 153, 194, 0.4);
    }
    .guide-bubble-btn.cancel {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .guide-bubble-tail {
      position: absolute;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      z-index: -1;
    }

    /* Tail directions - point toward the owl */
    .guide-bubble.tail-left .guide-bubble-tail {
      left: -7px;
      top: 50%;
      margin-top: -6px;
    }
    .guide-bubble.tail-right .guide-bubble-tail {
      right: -7px;
      top: 50%;
      margin-top: -6px;
    }
    .guide-bubble.tail-top .guide-bubble-tail {
      top: -7px;
      left: 50%;
      margin-left: -6px;
    }
    .guide-bubble.tail-bottom .guide-bubble-tail {
      bottom: -7px;
      left: 50%;
      margin-left: -6px;
    }

    .guide-bubble-loading {
      text-align: center;
      padding: 8px 0;
      font-size: 18px;
      letter-spacing: 2px;
    }
    .guide-bubble-loading .dot {
      animation: pulse 1.2s ease-in-out infinite;
    }
    .guide-bubble-loading .dot:nth-child(2) { animation-delay: 0.2s; }
    .guide-bubble-loading .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* --- Owl (existing) --- */
    .owl {
      position: absolute;
      width: 64px;
      height: 64px;
      background: url('owl-wing-pointer.png') no-repeat center / contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
      transition: left 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  top 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 200ms ease,
                  transform 300ms ease;
      opacity: 0;
      pointer-events: auto;
      cursor: grab;
    }
    .owl.visible { opacity: 0.65; }
    .owl.bob { animation: bob 1.4s ease-in-out infinite; }
    .owl.thinking {
      width: 56px;
      height: 56px;
      background: url('icon.png') no-repeat center / contain;
      animation: thinkingBob 2s ease-in-out infinite;
    }
    @keyframes thinkingBob {
      0%, 100% { transform: translateY(0) scale(1); }
      25% { transform: translateY(-6px) scale(1.05); }
      50% { transform: translateY(0) scale(1); }
      75% { transform: translateY(-3px) scale(1.02); }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    /* While dragged by the user: kill the smooth left/top transition and any
     * bob/thinking animation so the owl tracks the cursor 1:1. Declared after
     * .owl.bob / .owl.thinking so it wins equal-specificity ties. */
    .owl.dragging {
      cursor: grabbing;
      transition: none;
      animation: none;
    }
        .loading-text {
      color: #18BFE1;
      font-family: -apple-system, Segoe UI, system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* --- Capture screen overlay (camera focus frame) --- */
    .capture-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(0.5px);
      -webkit-backdrop-filter: blur(0.5px);
      pointer-events: none;
      user-select: none;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .capture-screen.active {
      display: flex;
      opacity: 1;
      align-items: center;
      justify-content: center;
    }

    .capture-frame {
      position: relative;
      width: 180px;
      height: 180px;
      animation: framePulse 1.8s ease-in-out infinite;
    }

    /* Camera-style corner brackets only */
    .capture-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background:
        linear-gradient(to right, rgba(255,255,255,0.85) 28px, transparent 28px) top left no-repeat,
        linear-gradient(to bottom, rgba(255,255,255,0.85) 28px, transparent 28px) top left no-repeat,
        linear-gradient(to left, rgba(255,255,255,0.85) 28px, transparent 28px) top right no-repeat,
        linear-gradient(to bottom, rgba(255,255,255,0.85) 28px, transparent 28px) top right no-repeat,
        linear-gradient(to right, rgba(255,255,255,0.85) 28px, transparent 28px) bottom left no-repeat,
        linear-gradient(to top, rgba(255,255,255,0.85) 28px, transparent 28px) bottom left no-repeat,
        linear-gradient(to left, rgba(255,255,255,0.85) 28px, transparent 28px) bottom right no-repeat,
        linear-gradient(to top, rgba(255,255,255,0.85) 28px, transparent 28px) bottom right no-repeat;
      background-size: 28px 2px, 2px 28px, 28px 2px, 2px 28px, 28px 2px, 2px 28px, 28px 2px, 2px 28px;
      animation: frameFlash 1.8s ease-in-out infinite;
    }

    /* Center focus ring */
    .capture-focus-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25), inset 0 0 8px rgba(255, 255, 255, 0.15);
      animation: ringPulse 1.8s ease-in-out infinite;
    }

    @keyframes framePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); opacity: 0.92; }
    }

    @keyframes frameFlash {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 0.95; }
    }

    @keyframes ringPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.08); opacity: 0.95; }
    }
  </style>
</head>
<body>
  <div id="owl" class="owl"></div>

  <!-- Guide Speech Bubble -->
  <div id="bubble" class="guide-bubble">
    <div class="guide-bubble-tail"></div>
    <div class="guide-bubble-caption" id="bubble-caption"></div>
    <div class="guide-bubble-buttons" id="bubble-buttons"></div>
    <div class="guide-bubble-loading" id="bubble-loading" style="display:none;">
      <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
  </div>

  <div id="capture-screen" class="capture-screen">
    <div class="capture-frame">
      <div class="capture-focus-ring"></div>
    </div>
  </div>
  <script src="./guide-overlay-renderer.js"></script>
</body>
</html>
