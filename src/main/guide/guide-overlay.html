<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    /* --- Guide Speech Bubble --- */
    .guide-bubble {
      position: absolute;
      min-width: 140px;
      max-width: 280px;
      padding: 10px 14px;
      border-radius: 12px;
      font-family: -apple-system, Segoe UI, system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: opacity 300ms ease, transform 300ms ease;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: auto;
      z-index: 100;
      display: none;
    }
    .guide-bubble.visible {
      opacity: 1;
      transform: translateY(0);
      display: block;
    }
    .guide-bubble.faded {
      opacity: 0.3;
    }

    /* Light theme */
    .guide-bubble.light {
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a1a;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .guide-bubble.light .guide-bubble-tail {
      background: rgba(255, 255, 255, 0.95);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    /* Dark theme */
    .guide-bubble.dark {
      background: rgba(30, 30, 30, 0.92);
      color: #f0f0f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .guide-bubble.dark .guide-bubble-tail {
      background: rgba(30, 30, 30, 0.92);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .guide-bubble-caption {
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .guide-bubble-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .guide-bubble-btn {
      padding: 5px 12px;
      border-radius: 16px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 100ms, opacity 150ms;
      font-family: inherit;
      pointer-events: auto;
    }
    .guide-bubble-btn:hover {
      transform: scale(1.05);
    }
    .guide-bubble-btn:active {
      transform: scale(0.95);
    }

    .guide-bubble-btn.primary {
      background: linear-gradient(135deg, #F2A93A, #F2C94C);
      color: white;
      box-shadow: 0 2px 8px rgba(242, 169, 58, 0.3);
    }
    .guide-bubble-btn.secondary {
      background: transparent;
      color: inherit;
      border: 1px solid rgba(116, 153, 194, 0.4);
    }
    .guide-bubble-btn.cancel {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .guide-bubble-tail {
      position: absolute;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      z-index: -1;
    }

    .guide-bubble-loading {
      text-align: center;
      padding: 8px 0;
      font-size: 18px;
      letter-spacing: 2px;
    }
    .guide-bubble-loading .dot {
      animation: pulse 1.2s ease-in-out infinite;
    }
    .guide-bubble-loading .dot:nth-child(2) { animation-delay: 0.2s; }
    .guide-bubble-loading .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* --- Owl (existing) --- */
    .owl {
      position: absolute;
      width: 64px;
      height: 64px;
      background: url('owl-wing-pointer.png') no-repeat center / contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
      transition: left 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  top 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 200ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .owl.visible { opacity: 1; }
    .owl.bob { animation: bob 1.4s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .loading {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
    }
    .loading.active { display: block; }
    .loading-ring {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(24, 191, 225, 0.2);
      border-top-color: #18BFE1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #18BFE1;
      font-family: -apple-system, Segoe UI, system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="owl" class="owl"></div>

  <!-- Guide Speech Bubble -->
  <div id="bubble" class="guide-bubble">
    <div class="guide-bubble-tail"></div>
    <div class="guide-bubble-caption" id="bubble-caption"></div>
    <div class="guide-bubble-buttons" id="bubble-buttons"></div>
    <div class="guide-bubble-loading" id="bubble-loading" style="display:none;">
      <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">Scanning screen…</div>
  </div>
  <script src="./guide-overlay-renderer.js"></script>
</body>
</html>
